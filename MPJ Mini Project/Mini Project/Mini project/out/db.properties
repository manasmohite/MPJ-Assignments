# Campus Navigator — Database Configuration
# Place this file in the src/ directory (it gets picked up from classpath)

# MySQL connection URL
# Add allowPublicKeyRetrieval=true if using MySQL 8+
db.url=jdbc:mysql://localhost:3306/campus_nav?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

# MySQL credentials
db.username=root
db.password=scet@123

# Note: Change db.password to match your local MySQL root password.
# On a fresh Homebrew MySQL install on macOS, root often has no password.
# In that case, leave db.password blank:
#   db.password=
